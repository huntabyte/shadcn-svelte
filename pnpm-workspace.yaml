packages:
    - packages/*
    - docs
    - registry-template

allowBuilds:
    "@hugeicons/svelte": false
    "@tailwindcss/oxide": true
    esbuild: true
    sharp: true
    workerd: true

catalog:
    "@sveltejs/kit": ^2.60.1
    "@sveltejs/vite-plugin-svelte": ^6.2.4
    svelte: ^5.54.0
    svelte-check: ^4.7.2
    tsdown: ^0.22.4
    typescript: ^7.0.2
    vite: ^7.3.1
    zod: ^4.3.6

onlyBuiltDependencies:
    - "@tailwindcss/oxide"
    - esbuild
    - sharp
    - workerd

overrides:
    brace-expansion@>=2.0.0 <=2.0.1: ">=2.0.2"
    cookie@<0.7.0: ">=0.7.0"
    glob@>=10.2.0 <10.5.0: ">=10.5.0"
    js-yaml@>=4.0.0 <4.1.1: ">=4.1.1"
    mdast-util-to-hast@>=13.0.0 <13.2.1: ">=13.2.1"
    tar@=7.5.1: ">=7.5.11"
