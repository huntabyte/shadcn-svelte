name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          SHADCN_SKIP_POSTINSTALL: "1"
        run: pnpm install --frozen-lockfile --filter 'docs...'

      - name: Prepare generated files
        run: pnpm build:cli && pnpm -F docs sync

      - name: Run svelte-check
        run: pnpm check

  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          SHADCN_SKIP_POSTINSTALL: "1"
        run: pnpm install --frozen-lockfile

      - run: pnpm lint

  cli-test:
    name: CLI-Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          SHADCN_SKIP_POSTINSTALL: "1"
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:cli

      - name: Run tests
        run: pnpm -F shadcn-svelte test
